<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Maintain GmbH — Zugang</title>
<script src="config.js"></script>
<style>
:root{--card:#fff;--ink:#172029;--mut:#647082;--line:#e2e7ee;--soft:#eef2f7;--brand:#0f6e63;--good:#1f9d6b;--bad:#d6453d;}
@media (prefers-color-scheme:dark){:root{--card:#171d26;--ink:#e9eef4;--mut:#93a0b0;--line:#28313d;--soft:#1b222c;--brand:#1aa393;}}
*{box-sizing:border-box}
body{margin:0;min-height:100vh;display:flex;align-items:center;justify-content:center;font-family:system-ui,-apple-system,"Segoe UI",Roboto,sans-serif;background:linear-gradient(135deg,#0f6e63,#13877a);color:var(--ink);padding:20px}
.card{background:var(--card);border-radius:18px;box-shadow:0 20px 60px rgba(0,0,0,.28);padding:34px 30px;max-width:410px;width:100%}
.logo{width:52px;height:52px;border-radius:14px;background:linear-gradient(135deg,#0f6e63,#13877a);display:flex;align-items:center;justify-content:center;color:#fff;font-size:26px;font-weight:800;margin-bottom:16px}
h1{font-size:20px;margin:0 0 4px} p.sub{margin:0 0 22px;color:var(--mut);font-size:13.5px}
label{font-size:12px;color:var(--mut);font-weight:600;display:block;margin-bottom:6px}
.row{display:flex;gap:8px}
input{flex:1;padding:12px 13px;border:1px solid var(--line);border-radius:10px;background:var(--soft);color:var(--ink);font-size:15px}
input:focus{outline:2px solid color-mix(in srgb,var(--brand) 40%,transparent);border-color:var(--brand)}
button.eye{border:1px solid var(--line);background:var(--soft);border-radius:10px;width:46px;cursor:pointer;font-size:16px;color:var(--mut)}
button.go{margin-top:16px;width:100%;padding:12px;border:0;border-radius:10px;background:var(--brand);color:#fff;font-size:15px;font-weight:700;cursor:pointer}
.chk{display:flex;align-items:center;gap:8px;margin-top:14px;font-size:13px;color:var(--mut);cursor:pointer}
.msg{margin-top:14px;font-size:13px;min-height:18px}.msg.err{color:var(--bad)}.msg.ok{color:var(--good)}
.foot{margin-top:20px;font-size:11.5px;color:var(--mut);line-height:1.6}.foot a{color:var(--brand)}
</style>
</head>
<body>
<div class="card">
  <div class="logo">M</div>
  <h1>Maintain GmbH</h1>
  <p class="sub">Management-Cockpit</p>
  <form id="f" autocomplete="off">
    <label for="tok">Zugangs-Token</label>
    <div class="row">
      <input type="password" id="tok" placeholder="Token eingeben…" autocomplete="off" autofocus>
      <button type="button" class="eye" id="eye" title="anzeigen">👁</button>
    </div>
    <label class="chk"><input type="checkbox" id="remember" checked> Auf diesem Gerät merken</label>
    <button type="submit" class="go">Anmelden →</button>
    <div class="msg" id="msg"></div>
  </form>
  <div class="foot" id="foot"></div>
</div>
<script>
const cfg=window.MAINTAIN_CONFIG||{};
const $=id=>document.getElementById(id);
async function sha(t){const b=await crypto.subtle.digest('SHA-256',new TextEncoder().encode(t));return[...new Uint8Array(b)].map(x=>x.toString(16).padStart(2,'0')).join('');}
async function ok(t){ if(!cfg.accessHash) return true; try{return (await sha(t))===cfg.accessHash;}catch(e){return false;} }
function goApp(){ location.replace(cfg.appUrl||'Maintain_GmbH_Management_Tool.html'); }
(async function(){
  if(!cfg.accessHash){ goApp(); return; }          // kein Extra-Token → direkt ins Tool
  const saved=localStorage.getItem('maintain_access');
  if(saved && await ok(saved)){ goApp(); }
})();
$('eye').onclick=()=>{const i=$('tok');i.type=i.type==='password'?'text':'password';};
$('f').onsubmit=async e=>{ e.preventDefault(); const t=$('tok').value.trim();
  if(!t){ $('msg').className='msg err'; $('msg').textContent='Bitte Token eingeben.'; return; }
  if(await ok(t)){ $('msg').className='msg ok'; $('msg').textContent='✓ weiter…'; if($('remember').checked)localStorage.setItem('maintain_access',t); setTimeout(goApp,300); }
  else { $('msg').className='msg err'; $('msg').textContent='✗ Falsches Token.'; $('tok').select(); }
};
$('foot').innerHTML = cfg.accessHash ? 'Token vergessen/ändern: <a href="set-token.html">Token-Helfer</a>.' : 'Weiterleitung…';
</script>
</body>
</html>
